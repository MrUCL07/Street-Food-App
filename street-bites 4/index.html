      point: [77.5723, 13.0073],
    },
  ];

  let selectedId = shops[0].id;

  const cityGeometry = {
    type: &quot;FeatureCollection&quot;,
    features: [
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;boundary&quot; },
        geometry: {
          type: &quot;Polygon&quot;,
          coordinates: [[
            [77.548, 12.915], [77.664, 12.915], [77.678, 12.950], [77.661, 13.020],
            [77.600, 13.033], [77.554, 13.017], [77.548, 12.965], [77.548, 12.915]
          ]]
        }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;water&quot; },
        geometry: {
          type: &quot;Polygon&quot;,
          coordinates: [[[77.623, 12.963], [77.631, 12.961], [77.635, 12.966], [77.632, 12.971], [77.625, 12.970], [77.623, 12.963]]]
        }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot;, major: true },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.556, 13.012], [77.578, 12.995], [77.598, 12.978], [77.621, 12.957], [77.646, 12.939], [77.667, 12.922]] }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot;, major: true },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.565, 12.924], [77.584, 12.940], [77.604, 12.952], [77.623, 12.965], [77.644, 12.982], [77.663, 13.005]] }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot; },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.557, 12.971], [77.578, 12.970], [77.603, 12.968], [77.629, 12.967], [77.655, 12.966]] }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot; },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.573, 12.920], [77.574, 12.944], [77.577, 12.971], [77.579, 12.995], [77.583, 13.018]] }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot; },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.614, 12.920], [77.615, 12.944], [77.621, 12.967], [77.637, 12.992], [77.650, 13.013]] }
      },
      {
        type: &quot;Feature&quot;,
        properties: { kind: &quot;road&quot; },
        geometry: { type: &quot;LineString&quot;, coordinates: [[77.553, 13.003], [77.577, 12.992], [77.602, 12.987], [77.628, 12.990], [77.654, 12.998]] }
      }
    ]
  };

  const projection = geoMercator().fitExtent([[38, 34], [650, 394]], cityGeometry);
  const path = geoPath(projection);
  const ns = &quot;http://www.w3.org/2000/svg&quot;;
  const mapCenter = { x: 340, y: 215 };
  let mapView = { x: 0, y: 0, k: 1 };
  let dragState = null;

  function svgElement(tag, attributes = {}) {
    const element = document.createElementNS(ns, tag);
    Object.entries(attributes).forEach(([name, value]) =&gt; element.setAttribute(name, value));
    return element;
  }

  function updateMapView() {
    mapViewport.setAttribute(&quot;transform&quot;, `translate(${mapView.x} ${mapView.y}) scale(${mapView.k})`);
    zoomStatus.textContent = `Map zoom ${Math.round(mapView.k * 100)} percent`;
  }

  function zoomMap(factor, anchor = mapCenter) {
    const nextScale = Math.max(0.75, Math.min(4, mapView.k * factor));
    const scaleChange = nextScale / mapView.k;
    mapView = {
      x: anchor.x - (anchor.x - mapView.x) * scaleChange,
      y: anchor.y - (anchor.y - mapView.y) * scaleChange,
      k: nextScale,
    };
    updateMapView();
  }

  function resetMap() {
    mapView = { x: 0, y: 0, k: 1 };
    updateMapView();
  }

  function mapPointFromEvent(event) {
    const bounds = map.getBoundingClientRect();
    return {
      x: ((event.clientX - bounds.left) / bounds.width) * 680,
      y: ((event.clientY - bounds.top) / bounds.height) * 430,
    };
  }

  function matchesCurrentFilters(shop) {
    const typedArea = normalizeText(areaSearch.value);
    const query = searchInput.value.trim().toLowerCase();
    const areaMatches = !typedArea || normalizeText(`${shop.area} ${shop.address}`).includes(typedArea);
    const content = [shop.name, shop.area, shop.address, ...shop.menu].join(&quot; &quot;).toLowerCase();
    return areaMatches &amp;&amp; (!query || content.includes(query));
  }

  function normalizeText(value) {
    return String(value).toLowerCase().replace(/[^a-z0-9]/g, &quot;&quot;);
  }

  function filteredShops() {
    return shops.filter(matchesCurrentFilters);
  }

  function drawBaseMap() {
    cityGeometry.features.forEach((feature) =&gt; {
      const featurePath = svgElement(&quot;path&quot;, { d: path(feature) });
      const { kind, major } = feature.properties;
      featurePath.setAttribute(&quot;class&quot;, kind === &quot;boundary&quot; ? &quot;map-boundary&quot; : kind === &quot;water&quot; ? &quot;water&quot; : `road${major ? &quot; major&quot; : &quot;&quot;}`);
      mapLayer.append(featurePath);
    });
    Object.entries(areaCenters).forEach(([area, coordinates]) =&gt; {
      const [x, y] = projection(coordinates);
      const label = svgElement(&quot;text&quot;, { x, y: y + 34, class: &quot;area-label&quot; });
      label.textContent = area;
      mapLayer.append(label);
    });
  }

  function showSelection(shop) {
    if (!shop) {
      selectedName.textContent = &quot;No matching stalls&quot;;
      selectedLocation.textContent = &quot;Try another area or a broader search.&quot;;
      selectedMenu.replaceChildren();
      selectedHours.textContent = &quot;&quot;;
      selectedPhone.textContent = &quot;&quot;;
      return;
    }
    selectedName.textContent = shop.name;
    selectedLocation.textContent = `${shop.address} · ${shop.area}`;
    selectedMenu.replaceChildren(...shop.menu.map((item) =&gt; {
      const chip = document.createElement(&quot;span&quot;);
      chip.textContent = item;
      return chip;
    }));
    selectedHours.textContent = shop.hours;
    selectedPhone.textContent = shop.phone || &quot;Contact number not provided&quot;;
  }

  function selectShop(id) {
    selectedId = id;
    render();
  }

  function renderMarkers(matches) {
    markerLayer.replaceChildren();
    shops.forEach((shop) =&gt; {
      const [x, y] = projection(shop.point);
      const marker = svgElement(&quot;g&quot;, {
        class: `map-marker${shop.id === selectedId ? &quot; is-selected&quot; : &quot;&quot;}${matches.includes(shop) ? &quot;&quot; : &quot; is-filtered&quot;}`,
        &quot;data-id&quot;: shop.id,
        &quot;aria-label&quot;: `${shop.name}, ${shop.area}`,
      });

      marker.append(circle);
      marker.addEventListener(&quot;click&quot;, () =&gt; selectShop(shop.id));
      marker.addEventListener(&quot;mouseenter&quot;, () =&gt; marker.setAttribute(&quot;data-tooltip&quot;, `${shop.name} · ${shop.area}`));
      markerLayer.append(marker);
    });
  }

  function renderResults(matches) {
    resultsList.replaceChildren();
    matches.forEach((shop) =&gt; {
      const button = document.createElement(&quot;button&quot;);
      button.type = &quot;button&quot;;
      button.className = `shop-result${shop.id === selectedId ? &quot; is-selected&quot; : &quot;&quot;}`;
      button.setAttribute(&quot;aria-pressed&quot;, shop.id === selectedId ? &quot;true&quot; : &quot;false&quot;);

        &lt;span class=&quot;result-pin&quot;&gt;&lt;i data-lucide=&quot;map-pin&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;/span&gt;
        &lt;span&gt;&lt;span class=&quot;result-name&quot;&gt;${escapeHtml(shop.name)}&lt;/span&gt;&lt;br&gt;&lt;span class=&quot;result-address&quot;&gt;${escapeHtml(shop.address)}&lt;/span&gt;&lt;/span&gt;
        &lt;span class=&quot;result-area&quot;&gt;${escapeHtml(shop.area)}&lt;/span&gt;`;
      button.addEventListener(&quot;click&quot;, () =&gt; selectShop(shop.id));
      resultsList.append(button);
    });
    if (matches.length === 0) {
      const empty = document.createElement(&quot;p&quot;);
      empty.className = &quot;text-muted&quot;;
      empty.textContent = &quot;No shops match these filters.&quot;;
      resultsList.append(empty);
    }
    window.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  }

  function escapeHtml(value) {
    return String(value).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, (character) =&gt; ({
      &quot;&amp;&quot;: &quot;&amp;amp;&quot;, &quot;&lt;&quot;: &quot;&amp;lt;&quot;, &quot;&gt;&quot;: &quot;&amp;gt;&quot;, &quot;&#x27;&quot;: &quot;&amp;#39;&quot;, &#x27;&quot;&#x27;: &quot;&amp;quot;&quot;
    })[character]);
  }

  function render() {
    const matches = filteredShops();
    if (!matches.some((shop) =&gt; shop.id === selectedId)) {
      selectedId = matches[0]?.id || &quot;&quot;;
    }
    const selectedShop = shops.find((shop) =&gt; shop.id === selectedId);
    const areaSuffix = areaSearch.value.trim() ? ` in ${areaSearch.value.trim()}` : &quot;&quot;;
    resultsStatus.textContent = `${matches.length} ${matches.length === 1 ? &quot;shop&quot; : &quot;shops&quot;} found${areaSuffix}`;
    showSelection(selectedShop);
    renderMarkers(matches);
    renderResults(matches);
  }

  function chooseRole() {
    root.querySelectorAll(&quot;[data-pane]&quot;).forEach((pane) =&gt; {
      pane.classList.remove(&quot;is-active&quot;);
    });
    root.querySelector(&#x27;[data-pane=&quot;welcome&quot;]&#x27;).classList.add(&quot;is-active&quot;);
    roleToolbar.hidden = true;
  }

  function activateRole(role) {
    if (!loginForm.reportValidity()) {
      loginFeedback.textContent = &quot;Enter a valid email address to continue.&quot;;
      return;
    }
    root.querySelectorAll(&quot;[data-pane]&quot;).forEach((pane) =&gt; {
      pane.classList.toggle(&quot;is-active&quot;, pane.dataset.pane === role);
    });
    const roleLabel = role === &quot;customer&quot; ? &quot;Customer version&quot; : &quot;Shop owner version&quot;;
    activeRoleLabel.textContent = `${roleLabel} · ${loginEmail.value.trim()}`;
    loginFeedback.textContent = `Signed in as ${loginEmail.value.trim()}.`;
    roleToolbar.hidden = false;
    if (role === &quot;customer&quot;) {
      render();
    }
  }

  root.querySelectorAll(&quot;[data-role]&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; activateRole(button.dataset.role));
  });
  root.querySelector(&#x27;[data-action=&quot;choose-role&quot;]&#x27;).addEventListener(&quot;click&quot;, chooseRole);

  zoomInButton.addEventListener(&quot;click&quot;, () =&gt; zoomMap(1.25));
  zoomOutButton.addEventListener(&quot;click&quot;, () =&gt; zoomMap(0.8));
  resetMapButton.addEventListener(&quot;click&quot;, resetMap);

  map.addEventListener(&quot;pointerdown&quot;, (event) =&gt; {
    if (event.pointerType === &quot;mouse&quot; &amp;&amp; event.button !== 0) {
      return;
    }
    dragState = { pointerId: event.pointerId, point: mapPointFromEvent(event) };
    map.setPointerCapture(event.pointerId);
    map.classList.add(&quot;is-panning&quot;);
  });

  map.addEventListener(&quot;pointermove&quot;, (event) =&gt; {
    if (dragState == null || event.pointerId !== dragState.pointerId) {
      return;
    }
    const point = mapPointFromEvent(event);
    mapView = {
      ...mapView,
      x: mapView.x + point.x - dragState.point.x,
      y: mapView.y + point.y - dragState.point.y,
    };
    dragState.point = point;
    updateMapView();
  });

  function stopMapDrag(event) {
    if (dragState == null || event.pointerId !== dragState.pointerId) {
      return;
    }
    map.releasePointerCapture(event.pointerId);
    dragState = null;
    map.classList.remove(&quot;is-panning&quot;);
  }

  map.addEventListener(&quot;pointerup&quot;, stopMapDrag);
  map.addEventListener(&quot;pointercancel&quot;, stopMapDrag);
  map.addEventListener(&quot;wheel&quot;, (event) =&gt; {
    event.preventDefault();
    zoomMap(event.deltaY &lt; 0 ? 1.2 : 1 / 1.2, mapPointFromEvent(event));
  }, { passive: false });

  areaSearch.addEventListener(&quot;input&quot;, render);
  searchInput.addEventListener(&quot;input&quot;, render);

  form.addEventListener(&quot;submit&quot;, (event) =&gt; {
    event.preventDefault();
    const details = new FormData(form);
    const area = details.get(&quot;area&quot;);
    const center = areaCenters[area];
    const sequence = shops.filter((shop) =&gt; shop.area === area).length + 1;
    const shop = {
      id: `shop-${Date.now()}`,
      name: details.get(&quot;name&quot;).trim(),
      area,
      address: details.get(&quot;address&quot;).trim(),
      menu: details.get(&quot;menu&quot;).split(&quot;,&quot;).map((item) =&gt; item.trim()).filter(Boolean),
      hours: details.get(&quot;hours&quot;).trim(),
      phone: details.get(&quot;phone&quot;).trim(),
      point: [center[0] + (sequence % 2 ? 0.0021 : -0.0021), center[1] + (sequence % 3 - 1) * 0.0017],
    };
    shops = [...shops, shop];
    selectedId = shop.id;
    areaSearch.value = area;
    searchInput.value = &quot;&quot;;
    form.reset();
    feedback.textContent = `${shop.name} is now visible to customers in ${area}.`;
    activateRole(&quot;customer&quot;);
    render();
  });

  drawBaseMap();
  updateMapView();
  render();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };

    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
